  <script>
  // ─── Security: Anti-inspection measures ───
  (function() {
    // Disable right-click context menu
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      return false;
    });
    // Disable keyboard shortcuts for DevTools / View Source
    document.addEventListener('keydown', function(e) {
      // F12
      if (e.key === 'F12') { e.preventDefault(); return false; }
      // Ctrl+Shift+I (DevTools), Ctrl+Shift+J (Console), Ctrl+Shift+C (Inspector)
      if (e.ctrlKey && e.shiftKey && ['I','i','J','j','C','c'].includes(e.key)) { e.preventDefault(); return false; }
      // Ctrl+U (View Source)
      if (e.ctrlKey && (e.key === 'u' || e.key === 'U')) { e.preventDefault(); return false; }
      // Cmd variants for Mac
      if (e.metaKey && e.altKey && ['i','I','j','J','c','C'].includes(e.key)) { e.preventDefault(); return false; }
      if (e.metaKey && (e.key === 'u' || e.key === 'U')) { e.preventDefault(); return false; }
    });
    // Clear console on load
    setTimeout(function() {
      console.clear();
      console.log('%cCapillary CS Hub', 'font-size:16px;font-weight:bold;color:#2080BD;');
      console.log('%cAccess to this console is monitored.', 'font-size:12px;color:#ef4444;');
    }, 1000);
    // DevTools detection removed for compatibility
  })();
  </script>

  <style>
*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; color: #1e293b; }
input, textarea, select, button { font-family: inherit; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
.sidebar { background: #142737; color: #e2e8f0; display: flex; flex-direction: column; height: 100vh; position: sticky; top: 0; overflow-y: auto; flex-shrink: 0; }
.sidebar::-webkit-scrollbar { width: 4px; } .sidebar::-webkit-scrollbar-track { background: transparent; } .sidebar::-webkit-scrollbar-thumb { background: #1a4a6a; border-radius: 2px; }
.nav-section { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #475569; padding: 16px 16px 6px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; cursor: pointer; border-radius: 8px; margin: 1px 8px; font-size: 13px; font-weight: 500; color: #94a3b8; transition: background 0.15s, color 0.15s; }
.nav-item:hover { background: rgba(255,255,255,0.07); color: #e2e8f0; } .nav-item.active { background: rgba(32,128,189,0.25); color: #fff; }
.cap-logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; color: #fff; } .cap-logo-mark { width: 32px; height: 32px; border-radius: 8px; overflow: hidden; } .cap-logo-mark img { width: 100%; height: 100%; object-fit: contain; }
